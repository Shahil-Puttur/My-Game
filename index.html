<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hide & Hunt - Tactical Laser Update</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: #2b2b2b; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; image-rendering: pixelated; } 
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; }
        #hud { position: absolute; top: 15px; width: 100%; text-align: center; pointer-events: auto; }
        .score-board { background: #1a1a1a; color: white; padding: 12px 25px; border-radius: 30px; border: 4px solid #f39c12; display: inline-block; font-weight: 900; font-size: 22px; box-shadow: 0 6px 0 #000; text-transform: uppercase; letter-spacing: 1px;}
        
        #joystick-zone { position: absolute; bottom: 30px; left: 30px; width: 140px; height: 140px; background: rgba(0, 0, 0, 0.2); border-radius: 50%; pointer-events: auto; border: 3px solid rgba(255,255,255,0.1); backdrop-filter: blur(4px); }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.9); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 4px 10px rgba(0,0,0,0.5); pointer-events: none;}
        
        #action-zone { position: absolute; bottom: 40px; right: 40px; pointer-events: auto; display: flex; gap: 20px; }
        .action-btn { width: 80px; height: 80px; border-radius: 50%; border: 4px solid rgba(0,0,0,0.3); color: white; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 30px; transition: transform 0.1s; box-shadow: inset 0 -5px 0 rgba(0,0,0,0.2), 0 5px 15px rgba(0,0,0,0.4);}
        .action-btn:active { transform: scale(0.9) translateY(4px); box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2), 0 2px 5px rgba(0,0,0,0.4); }
        
        #btn-search { background-color: #2ecc71; }
        /* Gun button glows when aiming */
        #btn-shoot { background-color: #e74c3c; transition: all 0.2s; }
        .aiming-mode { background-color: #c0392b !important; border-color: #f1c40f !important; box-shadow: 0 0 20px #e74c3c, inset 0 -5px 0 rgba(0,0,0,0.2) !important; transform: scale(1.1); }

        #alert-text { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #f1c40f; font-size: 35px; font-weight: 900; -webkit-text-stroke: 1.5px black; text-shadow: 0px 5px 0 #000; opacity: 0; transition: opacity 0.2s, top 0.2s; pointer-events: none; z-index: 50;}
        
        #loading { position: absolute; top:0; left:0; width: 100vw; height: 100vh; background: #2ecc71; color: white; display: flex; justify-content: center; align-items: center; font-size: 40px; font-weight: 900; z-index: 100; transition: opacity 0.5s; flex-direction: column;}
    </style>
</head>
<body>

    <div id="loading"><div>LOADING ASSETS...</div></div>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="hud"><div class="score-board">09:45 | Find Panda!</div></div>
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
        <div id="action-zone">
            <!-- Notice the event(e) passed to prevent movement freezing -->
            <div class="action-btn" id="btn-search" onmousedown="triggerSearch(event)" ontouchstart="triggerSearch(event)">🔎</div>
            <div class="action-btn" id="btn-shoot" onmousedown="triggerShoot(event)" ontouchstart="triggerShoot(event)">🔫</div>
        </div>
        <div id="alert-text">Nothing here...</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    // --- ASSETS ---
    const images = {}; let assetsLoaded = 0;
    const assetList = { tree: 'tree.png', chest: 'chest.png', house: 'house.png', rock: 'rock.png', bush: 'bush.png', panda: 'panda.png' };
    const totalAssets = Object.keys(assetList).length;

    for (let key in assetList) {
        images[key] = new Image();
        images[key].src = assetList[key];
        images[key].onload = () => {
            assetsLoaded++;
            if (assetsLoaded === totalAssets) {
                document.getElementById('loading').style.opacity = 0;
                setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
                gameLoop();
            }
        };
        images[key].onerror = () => { assetsLoaded++; };
    }

    // --- GAME CONSTANTS & FX ---
    const TILE_SIZE = 80; const MAP_SIZE = 25; 
    let camera = { x: 0, y: 0, shakeTime: 0, shakeIntensity: 0 }; 
    let explosions = []; // Stores blast effects

    // Controls
    let input = { x: 0, y: 0 }; let keys = {};
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    const joystickZone = document.getElementById('joystick-zone'); const joystickKnob = document.getElementById('joystick-knob');
    let isDragging = false, joystickCenter = { x: 0, y: 0 };
    
    joystickZone.addEventListener('touchstart', handleTouchStart); joystickZone.addEventListener('touchmove', handleTouchMove);
    joystickZone.addEventListener('touchend', handleTouchEnd); joystickZone.addEventListener('mousedown', handleTouchStart);
    window.addEventListener('mousemove', handleTouchMove); window.addEventListener('mouseup', handleTouchEnd);
    
    function handleTouchStart(e) { if (e.target !== joystickZone && e.target !== joystickKnob) return; isDragging = true; let rect = joystickZone.getBoundingClientRect(); joystickCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 }; updateJoystick(e); }
    function handleTouchMove(e) { if (!isDragging) return; e.preventDefault(); updateJoystick(e); }
    function handleTouchEnd() { isDragging = false; joystickKnob.style.transform = `translate(-50%, -50%)`; input = { x: 0, y: 0 }; }
    function updateJoystick(e) { 
        let clientX = e.touches ? e.touches[0].clientX : e.clientX; let clientY = e.touches ? e.touches[0].clientY : e.clientY; 
        let dx = clientX - joystickCenter.x; let dy = clientY - joystickCenter.y; let dist = Math.sqrt(dx * dx + dy * dy); let maxRad = 45; 
        if (dist > maxRad) { dx = (dx / dist) * maxRad; dy = (dy / dist) * maxRad; } 
        joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`; 
        input.x = dx / maxRad; input.y = dy / maxRad; 
    }

    // --- MAP GENERATOR ---
    let gameMap = []; let worldObjects = []; 
    for (let r = 0; r < MAP_SIZE; r++) {
        for (let c = 0; c < MAP_SIZE; c++) {
            let x = c * TILE_SIZE; let y = r * TILE_SIZE;
            if (r === 0 || r === MAP_SIZE - 1 || c === 0 || c === MAP_SIZE - 1) { worldObjects.push({ id: Math.random(), type: Math.random() > 0.5 ? 'tree' : 'rock', x: x, y: y, size: TILE_SIZE, isSolid: true });
            } else {
                let rand = Math.random();
                if (rand > 0.96) worldObjects.push({ id: Math.random(), type: 'chest', x: x, y: y, size: TILE_SIZE - 20, isSolid: true, hasMoney: true });
                else if (rand > 0.90) worldObjects.push({ id: Math.random(), type: 'bush', x: x, y: y, size: TILE_SIZE - 10, isSolid: false, hasMoney: Math.random() > 0.5 }); 
                else if (rand > 0.85) worldObjects.push({ id: Math.random(), type: 'tree', x: x, y: y, size: TILE_SIZE, isSolid: true });
                else if (rand > 0.82) worldObjects.push({ id: Math.random(), type: 'rock', x: x, y: y, size: TILE_SIZE - 20, isSolid: true });
            }
        }
    }

    // --- PLAYER CLASS ---
    class Player {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.width = 80; this.height = 80; this.speed = 6;
            this.facingRight = true; this.isMoving = false;
            this.frameX = 0; this.frameY = 0; this.gameFrame = 0; this.staggerFrames = 6;
            
            // TACTICAL MECHANICS
            this.aimDir = { x: 1, y: 0 }; 
            this.isAiming = false;
        }

        update() {
            // MOVEMENT FIX: Smoothly handle both Keyboard and Joystick without overriding
            let dx = 0; let dy = 0;
            if (keys['w'] || keys['arrowup']) dy -= 1;
            if (keys['s'] || keys['arrowdown']) dy += 1;
            if (keys['a'] || keys['arrowleft']) dx -= 1;
            if (keys['d'] || keys['arrowright']) dx += 1;

            if(input.x !== 0 || input.y !== 0) {
                dx = input.x; dy = input.y;
            }

            this.isMoving = (dx !== 0 || dy !== 0);

            // If we are moving, update the direction we face and aim!
            if (this.isMoving) { 
                let len = Math.sqrt(dx * dx + dy * dy); 
                dx /= len; dy /= len; 
                
                this.aimDir.x = dx;
                this.aimDir.y = dy;

                if (dy > 0.5) this.frameY = 0; 
                else if (dy < -0.5) this.frameY = 1; 
                else this.frameY = 2; 

                if (dx > 0) this.facingRight = true;
                if (dx < 0) this.facingRight = false;

                // Stop animating legs if aiming (looks cooler, like walking carefully)
                if(!this.isAiming) {
                    this.gameFrame++;
                    if (this.gameFrame % this.staggerFrames === 0) {
                        if (this.frameX < 3) this.frameX++; else this.frameX = 0; 
                    }
                } else {
                    this.frameX = 0; // Frozen tactical pose
                }
            } else {
                this.frameX = 0; this.gameFrame = 0;
            }

            // Apply movement Speed
            let moveSpeed = this.isAiming ? this.speed * 0.5 : this.speed; // Walk slower when aiming!
            let nextX = this.x + dx * moveSpeed; 
            let nextY = this.y + dy * moveSpeed;
            
            let collision = false;
            let playerHitbox = { left: nextX - 15, right: nextX + 15, top: nextY - 10, bottom: nextY + 25 };

            for (let obj of worldObjects) {
                if (obj.isSolid) {
                    let objHitbox = { left: obj.x, right: obj.x + obj.size, top: obj.y + (obj.size*0.4), bottom: obj.y + obj.size };
                    if (playerHitbox.right > objHitbox.left && playerHitbox.left < objHitbox.right && playerHitbox.bottom > objHitbox.top && playerHitbox.top < objHitbox.bottom) {
                        collision = true; break;
                    }
                }
            }
            if (!collision) { this.x = nextX; this.y = nextY; }

            // Camera Follow with MASSIVE SHAKE
            let targetCamX = this.x - canvas.width / 2;
            let targetCamY = this.y - canvas.height / 2;
            
            if(camera.shakeTime > 0) {
                targetCamX += (Math.random() - 0.5) * camera.shakeIntensity; 
                targetCamY += (Math.random() - 0.5) * camera.shakeIntensity; 
                camera.shakeTime--;
            }

            camera.x += (targetCamX - camera.x) * 0.1;
            camera.y += (targetCamY - camera.y) * 0.1;
        }

        draw(ctx) {
            ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.ellipse(this.x, this.y + 35, 25, 12, 0, 0, Math.PI * 2); ctx.fill();
            if (images['panda']) {
                let spriteW = images['panda'].width / 4; let spriteH = images['panda'].height / 3;
                ctx.save(); ctx.translate(this.x, this.y);
                if (!this.facingRight) ctx.scale(-1, 1); 
                ctx.drawImage(images['panda'], this.frameX * spriteW, this.frameY * spriteH, spriteW, spriteH, -this.width / 2, -this.height / 2, this.width, this.height);
                ctx.restore();
            }
        }
    }

    const player = new Player(MAP_SIZE * TILE_SIZE / 2, MAP_SIZE * TILE_SIZE / 2);

    // --- ACTIONS & ALERTS ---
    function showAlert(text, color) {
        const alertBox = document.getElementById('alert-text');
        alertBox.innerText = text; alertBox.style.color = color; alertBox.style.opacity = 1; alertBox.style.top = "35%";
        setTimeout(() => { alertBox.style.opacity = 0; alertBox.style.top = "40%"; }, 1200);
    }

    function triggerSearch(e) {
        e.stopPropagation(); // Prevents movement bug!
        let found = false;
        for (let obj of worldObjects) {
            let objCenterX = obj.x + obj.size/2; let objCenterY = obj.y + obj.size/2;
            let dist = Math.sqrt(Math.pow(objCenterX - player.x, 2) + Math.pow(objCenterY - player.y, 2));
            if (dist < TILE_SIZE && (obj.type === 'chest' || obj.type === 'bush')) {
                if (obj.hasMoney) { showAlert("💎 JACKPOT! 💎", "#3498db"); obj.hasMoney = false; } 
                else { showAlert("Empty...", "#e74c3c"); }
                found = true; break;
            }
        }
        if (!found) showAlert("Nothing here!", "#f39c12");
    }

    // --- THE TACTICAL LASER & SHOOTING LOGIC ---
    function triggerShoot(e) { 
        e.stopPropagation(); // Prevents movement bug!
        const btn = document.getElementById('btn-shoot');

        if (!player.isAiming) {
            // TAP 1: TURN ON LASER
            player.isAiming = true;
            btn.classList.add("aiming-mode");
            
        } else {
            // TAP 2: FIRE THE CANNON!
            player.isAiming = false;
            btn.classList.remove("aiming-mode");

            // Calculate Raycast (Where does the laser hit?)
            let gunX = player.x + (player.facingRight ? 20 : -20);
            let gunY = player.y + 10;
            let hitX = gunX; let hitY = gunY;
            let hitObjIndex = -1;

            // Step forward pixel by pixel to find the wall
            for(let i=0; i<600; i+=5) { 
                hitX += player.aimDir.x * 5; hitY += player.aimDir.y * 5;
                let collided = false;
                for (let j=0; j < worldObjects.length; j++) {
                    let obj = worldObjects[j];
                    if (obj.isSolid || obj.type === 'bush') {
                        if (hitX > obj.x && hitX < obj.x + obj.size && hitY > obj.y && hitY < obj.y + obj.size) {
                            hitObjIndex = j; collided = true; break;
                        }
                    }
                }
                if (collided) break;
            }

            // JUICE: Massive Camera Shake
            camera.shakeTime = 10;
            camera.shakeIntensity = 25; 

            // Create Blast Effect Array
            explosions.push({ x: hitX, y: hitY, radius: 10, maxRadius: 50, life: 1.0 });

            // DESTRUCTION SYSTEM!
            if (hitObjIndex !== -1) {
                let target = worldObjects[hitObjIndex];
                
                // If we hit a chest or bush, blow it up and remove it!
                if (target.type === 'chest' || target.type === 'bush') {
                    if (target.hasMoney) {
                        showAlert("💰 BLEW UP HIDDEN MONEY! 💰", "#2ecc71");
                    } else {
                        showAlert("Boom! Destroyed.", "#e74c3c");
                    }
                    worldObjects.splice(hitObjIndex, 1); // Delete from map!
                }
            } else {
                showAlert("Missed!", "#bdc3c7");
            }
        }
    }

    // --- RENDER LOOP ---
    function gameLoop() {
        ctx.fillStyle = '#6ab04c'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        player.update();

        ctx.save();
        ctx.translate(-Math.floor(camera.x), -Math.floor(camera.y));

        // Draw Map Grid
        for (let r = 0; r < MAP_SIZE; r++) {
            for (let c = 0; c < MAP_SIZE; c++) {
                if ((r+c)%2===0) { ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(c*TILE_SIZE, r*TILE_SIZE, TILE_SIZE, TILE_SIZE); }
            }
        }

        let renderQueue = [];
        renderQueue.push({ type: 'player', y: player.y + (player.height*0.4), obj: player });

        for(let obj of worldObjects) {
            let visualY = obj.y + obj.size; if(obj.type === 'house') visualY = obj.y + (obj.size * 1.5); 
            renderQueue.push({ type: 'world', y: visualY, obj: obj });
        }
        renderQueue.sort((a, b) => a.y - b.y);

        for(let item of renderQueue) {
            if(item.type === 'player') item.obj.draw(ctx);
            else {
                let wObj = item.obj;
                ctx.fillStyle = "rgba(0,0,0,0.3)";
                let shadowW = wObj.size * 0.8; let shadowH = wObj.size * 0.3;
                if(wObj.type !== 'bush') { ctx.beginPath(); ctx.ellipse(wObj.x + wObj.size/2, wObj.y + wObj.size - 10, shadowW/2, shadowH/2, 0, 0, Math.PI * 2); ctx.fill(); }

                if(images[wObj.type]) {
                    if(wObj.type === 'house') ctx.drawImage(images['house'], wObj.x - 20, wObj.y - 40, wObj.size * 1.5, wObj.size * 1.5);
                    else if(wObj.type === 'tree') ctx.drawImage(images['tree'], wObj.x - 10, wObj.y - 40, wObj.size * 1.2, wObj.size * 1.4);
                    else ctx.drawImage(images[wObj.type], wObj.x, wObj.y, wObj.size, wObj.size);
                }
            }
        }

        // DRAW LASER IF AIMING
        if (player.isAiming) {
            let gunX = player.x + (player.facingRight ? 20 : -20);
            let gunY = player.y + 10;
            
            // Calculate Laser end point (raycast)
            let laserX = gunX; let laserY = gunY;
            for(let i=0; i<600; i+=5) { 
                laserX += player.aimDir.x * 5; laserY += player.aimDir.y * 5;
                let hit = false;
                for (let obj of worldObjects) {
                    if ((obj.isSolid || obj.type === 'bush') && laserX > obj.x && laserX < obj.x + obj.size && laserY > obj.y && laserY < obj.y + obj.size) {
                        hit = true; break;
                    }
                }
                if (hit) break;
            }

            // Draw Red Laser Line
            ctx.beginPath();
            ctx.setLineDash([10, 10]); // Dashed line effect
            ctx.moveTo(gunX, gunY);
            ctx.lineTo(laserX, laserY);
            ctx.strokeStyle = "rgba(231, 76, 60, 0.7)"; // Transparent Red
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.setLineDash([]); // Reset dash

            // Draw Crosshair at the end
            ctx.beginPath();
            ctx.arc(laserX, laserY, 8, 0, Math.PI * 2);
            ctx.strokeStyle = "#e74c3c";
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.fillStyle = "rgba(231, 76, 60, 0.4)";
            ctx.fill();
        }

        // DRAW EXPLOSIONS
        for (let i = explosions.length - 1; i >= 0; i--) {
            let exp = explosions[i];
            
            ctx.beginPath();
            ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(241, 196, 15, ${exp.life})`; // Fading Yellow/Orange
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(exp.x, exp.y, exp.radius * 0.7, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(231, 76, 60, ${exp.life})`; // Fading Red Core
            ctx.fill();

            exp.radius += 5; // Expand fast
            exp.life -= 0.1; // Fade out fast
            if (exp.life <= 0) explosions.splice(i, 1);
        }

        ctx.restore();
        requestAnimationFrame(gameLoop);
    }
</script>
</body>
    </html>
