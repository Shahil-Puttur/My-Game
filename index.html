<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hide & Hunt - Massive World Update</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: #2b2b2b; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; image-rendering: pixelated; } 
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; }
        
        #hud { position: absolute; top: 15px; width: 100%; text-align: center; pointer-events: auto; }
        .score-board { background: #1a1a1a; color: white; padding: 12px 25px; border-radius: 30px; border: 4px solid #f39c12; display: inline-block; font-weight: 900; font-size: 22px; box-shadow: 0 6px 0 #000; text-transform: uppercase; letter-spacing: 1px;}
        
        /* Fixed Swap Button */
        #btn-swap { position: absolute; top: 15px; left: 15px; background: #9b59b6; border: 3px solid #8e44ad; color: white; padding: 10px 15px; border-radius: 15px; font-weight: bold; font-size: 18px; pointer-events: auto; cursor: pointer; box-shadow: 0 4px 0 #732d91; transition: transform 0.1s;}
        #btn-swap:active { transform: translateY(4px); box-shadow: none; }

        #joystick-zone { position: absolute; bottom: 30px; left: 30px; width: 140px; height: 140px; background: rgba(0, 0, 0, 0.2); border-radius: 50%; pointer-events: auto; border: 3px solid rgba(255,255,255,0.1); backdrop-filter: blur(4px); }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.9); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 4px 10px rgba(0,0,0,0.5); pointer-events: none;}
        
        #action-zone { position: absolute; bottom: 40px; right: 40px; pointer-events: auto; display: flex; gap: 20px; }
        .action-btn { width: 80px; height: 80px; border-radius: 50%; border: 4px solid rgba(0,0,0,0.3); color: white; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 30px; transition: transform 0.1s; box-shadow: inset 0 -5px 0 rgba(0,0,0,0.2), 0 5px 15px rgba(0,0,0,0.4);}
        .action-btn:active { transform: scale(0.9) translateY(4px); box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2), 0 2px 5px rgba(0,0,0,0.4); }
        
        #btn-search { background-color: #2ecc71; }
        #btn-shoot { background-color: #e74c3c; transition: all 0.2s; }
        .aiming-mode { background-color: #c0392b !important; border-color: #f1c40f !important; box-shadow: 0 0 20px #e74c3c, inset 0 -5px 0 rgba(0,0,0,0.2) !important; transform: scale(1.1); }

        #alert-text { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #f1c40f; font-size: 35px; font-weight: 900; -webkit-text-stroke: 1.5px black; text-shadow: 0px 5px 0 #000; opacity: 0; transition: opacity 0.2s, top 0.2s; pointer-events: none; z-index: 50;}
        
        /* PRO LOADING SCREEN */
        #loading { position: absolute; top:0; left:0; width: 100vw; height: 100vh; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; font-size: 40px; font-weight: 900; z-index: 100; transition: opacity 0.5s; flex-direction: column; text-transform: uppercase; letter-spacing: 2px;}
        #loading-bar-container { width: 60%; max-width: 400px; height: 20px; background: #333; border-radius: 10px; margin-top: 20px; border: 3px solid #555; overflow: hidden; }
        #loading-bar { width: 0%; height: 100%; background: #2ecc71; box-shadow: 0 0 10px #2ecc71; transition: width 0.2s; }
        #loading-text { font-size: 16px; margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>

    <!-- Professional Loading Screen -->
    <div id="loading">
        <div>INITIALIZING WORLD...</div>
        <div id="loading-bar-container"><div id="loading-bar"></div></div>
        <p id="loading-text">Loading Assets: 0%</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <!-- FIXED SWAP BUTTON: using onpointerdown to prevent double-tap bugs -->
        <div id="btn-swap" onpointerdown="swapCharacter(event)">🦊 Swap</div>
        
        <div id="hud"><div class="score-board">09:45 | Survive!</div></div>
        
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
        
        <div id="action-zone">
            <!-- Fixed action buttons using onpointerdown -->
            <div class="action-btn" id="btn-search" onpointerdown="triggerSearch(event)">🔎</div>
            <div class="action-btn" id="btn-shoot" onpointerdown="triggerShoot(event)">🔫</div>
        </div>
        
        <div id="alert-text">Nothing here...</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    // --- 1. MASSIVE ASSET & AUDIO PIPELINE ---
    const images = {}; 
    let assetsLoaded = 0;
    
    // All 20 New Assets + Characters mapped exactly to your filenames!
    const assetList = { 
        panda: 'panda.png', fox: 'fox.png',
        grass: 'Tall Grass Patch.png', log: 'Hollow Log.png', bush: 'Berry Bush.png', 
        tree: 'Pine Tree.png', shroom: 'Giant Mushroom.png', wall: 'Brick Wall Segment.png', 
        fence: 'Wooden Fence.png', pillar: 'Stone Pillar.png', well: 'Water Well.png', 
        statue: 'Animal Statue.png', barrel: 'Wooden Barrels.png', safe: 'Metal Safe.png', 
        crate: 'Supply Crate.png', vending: 'Vending Machine.png', sack: 'Loot Sack.png', 
        tent: 'Camping Tent.png', fire: 'Campfire.png', sign: 'Signpost.png', 
        cart: 'Broken Cart.png', stall: 'Market Stall.png'
    };
    
    const totalAssets = Object.keys(assetList).length + 1; // +1 for the Audio File!

    // Audio Setup
    const shootAudio = new Audio('shoot.mp3');
    shootAudio.oncanplaythrough = () => handleAssetLoad('Audio: shoot.mp3');
    shootAudio.onerror = () => handleAssetLoad('Audio Failed (Missing File)');

    function handleAssetLoad(name) {
        assetsLoaded++;
        let percent = Math.floor((assetsLoaded / totalAssets) * 100);
        document.getElementById('loading-bar').style.width = percent + "%";
        document.getElementById('loading-text').innerText = `Loading: ${percent}%`;

        if (assetsLoaded >= totalAssets) {
            setTimeout(() => {
                document.getElementById('loading').style.opacity = 0;
                setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
                gameLoop();
            }, 500); // Tiny pause so player sees 100% completion
        }
    }

    // Load Images
    for (let key in assetList) {
        images[key] = new Image(); 
        images[key].src = assetList[key];
        images[key].onload = () => handleAssetLoad(key);
        images[key].onerror = () => { console.error("MISSING FILE: " + assetList[key]); handleAssetLoad(key); };
    }

    // --- GAME CONSTANTS ---
    const TILE_SIZE = 80; const MAP_SIZE = 30; // Made map slightly bigger for all the new stuff!
    let camera = { x: 0, y: 0, shakeTime: 0, shakeIntensity: 0 }; 
    let explosions = []; 

    // Categorizing the new assets for the Generator!
    const solidCover = ['tree', 'wall', 'fence', 'pillar', 'well', 'statue', 'vending', 'tent', 'sign', 'cart', 'stall'];
    const destructibles = ['safe', 'barrel', 'crate', 'sack', 'log'];
    const hidingSpots = ['bush', 'grass', 'shroom', 'fire'];

    // --- CONTROLS ---
    let input = { x: 0, y: 0 }; let keys = {};
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true); window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    const joystickZone = document.getElementById('joystick-zone'); const joystickKnob = document.getElementById('joystick-knob');
    let isDragging = false, joystickCenter = { x: 0, y: 0 };
    joystickZone.addEventListener('touchstart', handleTouchStart); joystickZone.addEventListener('touchmove', handleTouchMove); joystickZone.addEventListener('touchend', handleTouchEnd); joystickZone.addEventListener('mousedown', handleTouchStart); window.addEventListener('mousemove', handleTouchMove); window.addEventListener('mouseup', handleTouchEnd);
    function handleTouchStart(e) { if (e.target !== joystickZone && e.target !== joystickKnob) return; isDragging = true; let rect = joystickZone.getBoundingClientRect(); joystickCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 }; updateJoystick(e); }
    function handleTouchMove(e) { if (!isDragging) return; e.preventDefault(); updateJoystick(e); }
    function handleTouchEnd() { isDragging = false; joystickKnob.style.transform = `translate(-50%, -50%)`; input = { x: 0, y: 0 }; }
    function updateJoystick(e) { let clientX = e.touches ? e.touches[0].clientX : e.clientX; let clientY = e.touches ? e.touches[0].clientY : e.clientY; let dx = clientX - joystickCenter.x; let dy = clientY - joystickCenter.y; let dist = Math.sqrt(dx * dx + dy * dy); let maxRad = 45; if (dist > maxRad) { dx = (dx / dist) * maxRad; dy = (dy / dist) * maxRad; } joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`; input.x = dx / maxRad; input.y = dy / maxRad; }

    // --- PRO MAP GENERATOR ---
    let worldObjects = []; 
    for (let r = 0; r < MAP_SIZE; r++) {
        for (let c = 0; c < MAP_SIZE; c++) {
            let x = c * TILE_SIZE; let y = r * TILE_SIZE;
            
            // Map Borders (Trees and Pillars)
            if (r === 0 || r === MAP_SIZE - 1 || c === 0 || c === MAP_SIZE - 1) { 
                worldObjects.push({ type: Math.random() > 0.5 ? 'tree' : 'pillar', x: x, y: y, size: TILE_SIZE, isSolid: true, isHidingSpot: false });
            } else {
                let rand = Math.random();
                // 4% chance for Destructible Loot
                if (rand > 0.96) {
                    let randomItem = destructibles[Math.floor(Math.random() * destructibles.length)];
                    worldObjects.push({ type: randomItem, x: x, y: y, size: TILE_SIZE - 15, isSolid: true, isHidingSpot: false, hasMoney: true });
                } 
                // 6% chance for Hiding Spots (Pass-through)
                else if (rand > 0.90) {
                    let randomItem = hidingSpots[Math.floor(Math.random() * hidingSpots.length)];
                    worldObjects.push({ type: randomItem, x: x, y: y, size: TILE_SIZE, isSolid: false, isHidingSpot: true, hasMoney: Math.random() > 0.5 }); 
                } 
                // 10% chance for Solid Decor/Cover
                else if (rand > 0.80) {
                    let randomItem = solidCover[Math.floor(Math.random() * solidCover.length)];
                    worldObjects.push({ type: randomItem, x: x, y: y, size: TILE_SIZE, isSolid: true, isHidingSpot: false, hasMoney: false });
                }
            }
        }
    }

    // --- PLAYER CLASS ---
    class Player {
        constructor(x, y, spriteName) {
            this.x = x; this.y = y; this.width = 80; this.height = 80; this.speed = 6;
            this.spriteName = spriteName; 
            this.facingRight = true; this.isMoving = false;
            this.frameX = 0; this.frameY = 0; this.gameFrame = 0; this.staggerFrames = 6;
            this.aimDir = { x: 1, y: 0 }; this.isAiming = false;
        }

        update() {
            let dx = 0; let dy = 0;
            if (keys['w'] || keys['arrowup']) dy -= 1; if (keys['s'] || keys['arrowdown']) dy += 1;
            if (keys['a'] || keys['arrowleft']) dx -= 1; if (keys['d'] || keys['arrowright']) dx += 1;
            if(input.x !== 0 || input.y !== 0) { dx = input.x; dy = input.y; }

            this.isMoving = (dx !== 0 || dy !== 0);

            if (this.isMoving) { 
                let len = Math.sqrt(dx * dx + dy * dy); dx /= len; dy /= len; 
                this.aimDir.x = dx; this.aimDir.y = dy;
                if (dy > 0.5) this.frameY = 0; else if (dy < -0.5) this.frameY = 1; else this.frameY = 2; 
                if (dx > 0) this.facingRight = true; if (dx < 0) this.facingRight = false;

                if(!this.isAiming) {
                    this.gameFrame++;
                    if (this.gameFrame % this.staggerFrames === 0) { if (this.frameX < 3) this.frameX++; else this.frameX = 0; }
                } else { this.frameX = 0; }
            } else { this.frameX = 0; this.gameFrame = 0; }

            let moveSpeed = this.isAiming ? this.speed * 0.5 : this.speed; 
            let nextX = this.x + dx * moveSpeed; let nextY = this.y + dy * moveSpeed;
            
            let collision = false;
            let playerHitbox = { left: nextX - 15, right: nextX + 15, top: nextY - 10, bottom: nextY + 25 };

            for (let obj of worldObjects) {
                if (obj.isSolid) {
                    let objHitbox = { left: obj.x, right: obj.x + obj.size, top: obj.y + (obj.size*0.4), bottom: obj.y + obj.size };
                    if (playerHitbox.right > objHitbox.left && playerHitbox.left < objHitbox.right && playerHitbox.bottom > objHitbox.top && playerHitbox.top < objHitbox.bottom) { collision = true; break; }
                }
            }
            if (!collision) { this.x = nextX; this.y = nextY; }

            let targetCamX = this.x - canvas.width / 2; let targetCamY = this.y - canvas.height / 2;
            if(camera.shakeTime > 0) { targetCamX += (Math.random() - 0.5) * camera.shakeIntensity; targetCamY += (Math.random() - 0.5) * camera.shakeIntensity; camera.shakeTime--; }
            camera.x += (targetCamX - camera.x) * 0.1; camera.y += (targetCamY - camera.y) * 0.1;
        }

        draw(ctx) {
            ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.ellipse(this.x, this.y + 35, 25, 12, 0, 0, Math.PI * 2); ctx.fill();
            if (images[this.spriteName]) {
                let currentImage = images[this.spriteName];
                let spriteW = currentImage.width / 4; let spriteH = currentImage.height / 3;
                ctx.save(); ctx.translate(this.x, this.y);
                if (!this.facingRight) ctx.scale(-1, 1); 
                ctx.drawImage(currentImage, this.frameX * spriteW, this.frameY * spriteH, spriteW, spriteH, -this.width / 2, -this.height / 2, this.width, this.height);
                ctx.restore();
            }
        }
    }

    const player = new Player(MAP_SIZE * TILE_SIZE / 2, MAP_SIZE * TILE_SIZE / 2, 'panda');

    // --- UI ACTIONS & AUDIO ---
    function showAlert(text, color) {
        const alertBox = document.getElementById('alert-text');
        alertBox.innerText = text; alertBox.style.color = color; alertBox.style.opacity = 1; alertBox.style.top = "35%";
        setTimeout(() => { alertBox.style.opacity = 0; alertBox.style.top = "40%"; }, 1200);
    }

    function swapCharacter(e) {
        e.preventDefault(); // Stops double fire
        if(player.spriteName === 'panda') {
            player.spriteName = 'fox';
            document.getElementById('btn-swap').innerText = "🐼 Swap";
            document.getElementById('btn-swap').style.background = "#e67e22";
            document.getElementById('btn-swap').style.borderColor = "#d35400";
            showAlert("Swapped to FOX!", "#e67e22");
        } else {
            player.spriteName = 'panda';
            document.getElementById('btn-swap').innerText = "🦊 Swap";
            document.getElementById('btn-swap').style.background = "#9b59b6";
            document.getElementById('btn-swap').style.borderColor = "#8e44ad";
            showAlert("Swapped to PANDA!", "#ecf0f1");
        }
    }

    function triggerSearch(e) {
        e.preventDefault(); 
        let found = false;
        for (let obj of worldObjects) {
            let objCenterX = obj.x + obj.size/2; let objCenterY = obj.y + obj.size/2;
            let dist = Math.sqrt(Math.pow(objCenterX - player.x, 2) + Math.pow(objCenterY - player.y, 2));
            // Search applies to hiding spots and destructibles
            if (dist < TILE_SIZE * 1.2 && (obj.isHidingSpot || obj.hasMoney !== undefined)) {
                if (obj.hasMoney) { showAlert("💎 JACKPOT! 💎", "#3498db"); obj.hasMoney = false; } 
                else { showAlert("Empty...", "#e74c3c"); }
                found = true; break;
            }
        }
        if (!found) showAlert("Nothing here!", "#f39c12");
    }

    function triggerShoot(e) { 
        e.preventDefault(); 
        const btn = document.getElementById('btn-shoot');

        if (!player.isAiming) {
            player.isAiming = true; btn.classList.add("aiming-mode");
        } else {
            player.isAiming = false; btn.classList.remove("aiming-mode");
            
            // --- PLAY SHOOT SOUND ---
            let sfx = shootAudio.cloneNode();
            sfx.volume = 0.6;
            sfx.play().catch(e => console.log("Audio play prevented until screen is tapped"));

            // Calculate Laser Hit
            let gunX = player.x + (player.facingRight ? 20 : -20); let gunY = player.y + 10;
            let hitX = gunX; let hitY = gunY; let hitObjIndex = -1;

            for(let i=0; i<600; i+=5) { 
                hitX += player.aimDir.x * 5; hitY += player.aimDir.y * 5; let collided = false;
                for (let j=0; j < worldObjects.length; j++) {
                    let obj = worldObjects[j];
                    if (obj.isSolid || obj.isHidingSpot) {
                        if (hitX > obj.x && hitX < obj.x + obj.size && hitY > obj.y && hitY < obj.y + obj.size) { hitObjIndex = j; collided = true; break; }
                    }
                }
                if (collided) break;
            }

            camera.shakeTime = 12; camera.shakeIntensity = 25; 
            explosions.push({ x: hitX, y: hitY, radius: 10, maxRadius: 50, life: 1.0 });

            if (hitObjIndex !== -1) {
                let target = worldObjects[hitObjIndex];
                // Destroy destructibles and hiding spots!
                if (!solidCover.includes(target.type)) {
                    if (target.hasMoney) showAlert("💰 BLEW UP HIDDEN MONEY! 💰", "#2ecc71");
                    else showAlert("Boom! Destroyed.", "#e74c3c");
                    worldObjects.splice(hitObjIndex, 1); 
                } else {
                    showAlert("Solid Wall Hit!", "#bdc3c7");
                }
            }
        }
    }

    // --- RENDER LOOP ---
    function gameLoop() {
        ctx.fillStyle = '#6ab04c'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        player.update();
        ctx.save(); ctx.translate(-Math.floor(camera.x), -Math.floor(camera.y));

        // Checkerboard Ground
        for (let r = 0; r < MAP_SIZE; r++) { for (let c = 0; c < MAP_SIZE; c++) { if ((r+c)%2===0) { ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(c*TILE_SIZE, r*TILE_SIZE, TILE_SIZE, TILE_SIZE); } } }

        let renderQueue = [];
        renderQueue.push({ type: 'player', y: player.y + (player.height*0.4), obj: player });
        
        for(let obj of worldObjects) { 
            let visualY = obj.y + obj.size; 
            // Adjust depth for naturally taller objects
            if(obj.type === 'stall' || obj.type === 'tree' || obj.type === 'tent') visualY = obj.y + (obj.size * 1.2); 
            renderQueue.push({ type: 'world', y: visualY, obj: obj }); 
        }
        
        // The Magic Y-Sort (Depth Rendering)
        renderQueue.sort((a, b) => a.y - b.y);

        for(let item of renderQueue) {
            if(item.type === 'player') item.obj.draw(ctx);
            else {
                let wObj = item.obj; 
                
                // Draw drop shadow for objects
                if(!wObj.isHidingSpot) { 
                    ctx.fillStyle = "rgba(0,0,0,0.3)"; 
                    ctx.beginPath(); 
                    ctx.ellipse(wObj.x + wObj.size/2, wObj.y + wObj.size - 10, wObj.size*0.4, wObj.size*0.15, 0, 0, Math.PI * 2); 
                    ctx.fill(); 
                }

                if(images[wObj.type]) {
                    // Make certain big objects draw slightly larger than their hitbox
                    let drawSize = wObj.size;
                    let drawX = wObj.x;
                    let drawY = wObj.y;
                    
                    if(['tree', 'stall', 'tent', 'statue'].includes(wObj.type)) {
                        drawSize = wObj.size * 1.3;
                        drawX = wObj.x - 10;
                        drawY = wObj.y - 20;
                    }
                    
                    ctx.drawImage(images[wObj.type], drawX, drawY, drawSize, drawSize);
                }
            }
        }

        // DRAW LASER IF AIMING
        if (player.isAiming) {
            let gunX = player.x + (player.facingRight ? 20 : -20); let gunY = player.y + 10;
            let laserX = gunX; let laserY = gunY;
            for(let i=0; i<600; i+=5) { 
                laserX += player.aimDir.x * 5; laserY += player.aimDir.y * 5; let hit = false;
                for (let obj of worldObjects) { if ((obj.isSolid || obj.isHidingSpot) && laserX > obj.x && laserX < obj.x + obj.size && laserY > obj.y && laserY < obj.y + obj.size) { hit = true; break; } }
                if (hit) break;
            }
            ctx.beginPath(); ctx.setLineDash([10, 10]); ctx.moveTo(gunX, gunY); ctx.lineTo(laserX, laserY); ctx.strokeStyle = "rgba(231, 76, 60, 0.7)"; ctx.lineWidth = 4; ctx.stroke(); ctx.setLineDash([]);
            ctx.beginPath(); ctx.arc(laserX, laserY, 8, 0, Math.PI * 2); ctx.strokeStyle = "#e74c3c"; ctx.lineWidth = 3; ctx.stroke(); ctx.fillStyle = "rgba(231, 76, 60, 0.4)"; ctx.fill();
        }

        // DRAW EXPLOSIONS
        for (let i = explosions.length - 1; i >= 0; i--) {
            let exp = explosions[i];
            ctx.beginPath(); ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI * 2); ctx.fillStyle = `rgba(241, 196, 15, ${exp.life})`; ctx.fill();
            ctx.beginPath(); ctx.arc(exp.x, exp.y, exp.radius * 0.7, 0, Math.PI * 2); ctx.fillStyle = `rgba(231, 76, 60, ${exp.life})`; ctx.fill();
            exp.radius += 6; exp.life -= 0.1; if (exp.life <= 0) explosions.splice(i, 1);
        }

        ctx.restore(); requestAnimationFrame(gameLoop);
    }
</script>
</body>
    </html>
