<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hide & Hunt - 1v1 Arena</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: #2b2b2b; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; image-rendering: pixelated; } 
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 10; display: none; }
        
        #hud { position: absolute; top: 15px; width: 100%; text-align: center; pointer-events: auto; }
        .score-board { background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; border: 3px solid #f39c12; display: inline-block; font-weight: 900; font-size: 18px; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .hp-text { color: #e74c3c; font-size: 20px; }
        
        #btn-swap { position: absolute; top: 15px; left: 15px; background: #9b59b6; border: 3px solid #8e44ad; color: white; padding: 12px 20px; border-radius: 15px; font-weight: bold; font-size: 18px; pointer-events: auto; cursor: pointer; box-shadow: 0 4px 0 #732d91; transition: transform 0.1s;}
        #btn-swap:active { transform: translateY(4px); box-shadow: none; }

        #joystick-zone { position: absolute; bottom: 30px; left: 30px; width: 140px; height: 140px; background: rgba(0, 0, 0, 0.2); border-radius: 50%; pointer-events: auto; border: 3px solid rgba(255,255,255,0.1); backdrop-filter: blur(4px); }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.9); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 4px 10px rgba(0,0,0,0.5); pointer-events: none;}
        
        #action-zone { position: absolute; bottom: 40px; right: 40px; pointer-events: auto; display: flex; gap: 20px; }
        .action-btn { width: 80px; height: 80px; border-radius: 50%; border: 4px solid rgba(0,0,0,0.3); color: white; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 30px; transition: transform 0.1s; box-shadow: inset 0 -5px 0 rgba(0,0,0,0.2), 0 5px 15px rgba(0,0,0,0.4);}
        .action-btn:active { transform: scale(0.9) translateY(4px); box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2), 0 2px 5px rgba(0,0,0,0.4); }
        
        #btn-search { background-color: #2ecc71; }
        #btn-shoot { background-color: #e74c3c; transition: all 0.2s; }
        .aiming-mode { background-color: #c0392b !important; border-color: #f1c40f !important; box-shadow: 0 0 20px #e74c3c, inset 0 -5px 0 rgba(0,0,0,0.2) !important; transform: scale(1.1); }

        #alert-text { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #f1c40f; font-size: 35px; font-weight: 900; -webkit-text-stroke: 1.5px black; text-shadow: 0px 5px 0 #000; opacity: 0; transition: opacity 0.2s, top 0.2s; pointer-events: none; z-index: 50; text-align: center;}
        
        /* Loading & Menus */
        .overlay-screen { position: absolute; top:0; left:0; width: 100vw; height: 100vh; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; font-size: 30px; font-weight: 900; z-index: 100; flex-direction: column; text-transform: uppercase; letter-spacing: 2px; }
        #loading-bar-container { width: 60%; max-width: 400px; height: 20px; background: #333; border-radius: 10px; margin-top: 20px; border: 3px solid #555; overflow: hidden; }
        #loading-bar { width: 0%; height: 100%; background: #2ecc71; box-shadow: 0 0 10px #2ecc71; transition: width 0.2s; }
        
        .setup-box { background: #2b2b2b; padding: 30px; border-radius: 20px; border: 4px solid #f39c12; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .input-field { width: 100%; padding: 15px; margin: 15px 0; font-size: 20px; font-weight: bold; text-align: center; border-radius: 10px; border: none; text-transform: uppercase; }
        .start-btn { background: #2ecc71; border: none; padding: 15px 40px; font-size: 24px; color: white; font-weight: bold; border-radius: 10px; cursor: pointer; border-bottom: 5px solid #27ae60; width: 100%; margin-top: 10px;}
        .start-btn:active { transform: translateY(5px); border-bottom: 0; }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading" class="overlay-screen">
        <div>INITIALIZING WORLD...</div>
        <div id="loading-bar-container"><div id="loading-bar"></div></div>
        <p id="loading-text" style="font-size:16px; margin-top:10px; color:#aaa;">Loading Assets: 0%</p>
    </div>

    <!-- Player Setup Screen -->
    <div id="setup-screen" class="overlay-screen" style="display: none;">
        <div class="setup-box">
            <h2 style="color: #f1c40f; margin-bottom: 20px;">FIGHTER SETUP</h2>
            <p style="font-size: 16px; color:#bdc3c7;">Player 1 (Panda Team)</p>
            <input type="text" id="p1-name" class="input-field" placeholder="Enter Name" value="Panda">
            <p style="font-size: 16px; color:#bdc3c7; margin-top:10px;">Player 2 (Fox Team)</p>
            <input type="text" id="p2-name" class="input-field" placeholder="Enter Name" value="Fox">
            <button class="start-btn" onclick="startGame()">ENTER ARENA</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="btn-swap">🐼 Swap Player</div>
        <div id="hud"><div class="score-board" id="game-hud">...</div></div>
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
        <div id="action-zone">
            <div class="action-btn" id="btn-search">🔎</div>
            <div class="action-btn" id="btn-shoot">🔫</div>
        </div>
        <div id="alert-text">Nothing here...</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas'); 
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    // --- 1. ASSET PRELOADER ---
    const images = {}; 
    let assetsLoaded = 0;
    
    const assetList = { 
        panda: 'panda.png', fox: 'fox.png',
        grass: 'Tall Grass Patch.png', log: 'Hollow Log.png', bush: 'Berry Bush.png', 
        tree: 'Pine Tree.png', shroom: 'Giant Mushroom.png', wall: 'Brick Wall Segment.png', 
        fence: 'Wooden Fence.png', pillar: 'Stone Pillar.png', well: 'Water Well.png', 
        statue: 'Animal Statue.png', barrel: 'Wooden Barrels.png', safe: 'Metal Safe.png', 
        crate: 'Supply Crate.png', vending: 'Vending Machine.png', sack: 'Loot Sack.png', 
        tent: 'Camping Tent.png', fire: 'Campfire.png', sign: 'Signpost.png', 
        cart: 'Broken Cart.png', stall: 'Market Stall.png'
    };
    const totalAssets = Object.keys(assetList).length + 1;

    function assetCheck() {
        assetsLoaded++;
        let percent = Math.floor((assetsLoaded / totalAssets) * 100);
        document.getElementById('loading-bar').style.width = percent + "%";
        document.getElementById('loading-text').innerText = `Loading: ${percent}%`;

        if (assetsLoaded >= totalAssets) {
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('setup-screen').style.display = 'flex'; // Show Setup
            }, 500);
        }
    }

    const shootAudio = new Audio('shoot.mp3');
    shootAudio.oncanplaythrough = assetCheck;
    shootAudio.onerror = assetCheck; 

    for (let key in assetList) {
        let img = new Image(); 
        let isLoaded = false;
        const markLoaded = () => { if(!isLoaded) { isLoaded = true; assetCheck(); } };
        img.onload = markLoaded; img.onerror = markLoaded; 
        img.src = assetList[key];
        if(img.complete) markLoaded();
        images[key] = img;
    }

    // --- GAME CONSTANTS ---
    const TILE_SIZE = 80; 
    const MAP_SIZE = 60; // MASSIVE MAP (4800x4800 px)
    let camera = { x: 0, y: 0, shakeTime: 0, shakeIntensity: 0 }; 
    let explosions = []; 
    let worldObjects = [];

    const solidCover = ['tree', 'wall', 'fence', 'pillar', 'well', 'statue', 'vending', 'tent', 'sign', 'cart', 'stall'];
    const destructibles = ['safe', 'barrel', 'crate', 'sack', 'log'];
    const hidingSpots = ['bush', 'grass', 'shroom', 'fire'];

    // --- PLAYER CLASS ---
    class Player {
        constructor(x, y, spriteName) {
            this.x = x; this.y = y; this.width = 100; this.height = 100; this.speed = 6;
            this.spriteName = spriteName; 
            this.name = ""; this.hp = 100; this.isDead = false;
            
            this.frameX = 0; this.frameY = 0; this.gameFrame = 0; this.staggerFrames = 5; 
            this.facingRight = true; this.isMoving = false;
            this.aimDir = { x: 1, y: 0 }; this.isAiming = false;
        }

        update(isActive) {
            if(this.isDead) return;

            let dx = 0; let dy = 0;
            
            // Only the currently selected player can move
            if (isActive) {
                if(input.x !== 0 || input.y !== 0) { dx = input.x; dy = input.y; }
            }

            this.isMoving = (dx !== 0 || dy !== 0);

            if (this.isMoving) { 
                let len = Math.sqrt(dx * dx + dy * dy); dx /= len; dy /= len; 
                this.aimDir.x = dx; this.aimDir.y = dy;
                
                if (Math.abs(dx) > Math.abs(dy)) {
                    this.frameY = 2; // Side
                    if (dx > 0) this.facingRight = true; 
                    if (dx < 0) this.facingRight = false;
                } else if (dy > 0) { this.frameY = 0; } // Down
                else if (dy < 0) { this.frameY = 1; } // Up

                if(!this.isAiming) {
                    this.gameFrame++;
                    if (this.gameFrame % this.staggerFrames === 0) this.frameX = (this.frameX + 1) % 4;
                } else { this.frameX = 0; }
            } else { 
                this.frameX = 0; this.gameFrame = 0; 
            }

            let moveSpeed = this.isAiming ? this.speed * 0.4 : this.speed; 
            let nextX = this.x + dx * moveSpeed; let nextY = this.y + dy * moveSpeed;
            
            let collision = false;
            let pBox = { left: nextX - 20, right: nextX + 20, top: nextY - 15, bottom: nextY + 30 };

            for (let obj of worldObjects) {
                if (obj.isSolid) {
                    let objBox = { left: obj.x, right: obj.x + obj.size, top: obj.y + (obj.size*0.4), bottom: obj.y + obj.size };
                    if (pBox.right > objBox.left && pBox.left < objBox.right && pBox.bottom > objBox.top && pBox.top < objBox.bottom) { collision = true; break; }
                }
            }
            // Map boundaries
            if(nextX < 40 || nextX > (MAP_SIZE*TILE_SIZE)-40 || nextY < 40 || nextY > (MAP_SIZE*TILE_SIZE)-40) collision = true;

            if (!collision) { this.x = nextX; this.y = nextY; }
        }

        draw(ctx) {
            if(this.isDead) return;

            // Health Bar
            ctx.fillStyle = "black"; ctx.fillRect(this.x - 30, this.y - 65, 60, 10);
            ctx.fillStyle = this.hp > 50 ? "#2ecc71" : (this.hp > 20 ? "#f1c40f" : "#e74c3c");
            ctx.fillRect(this.x - 29, this.y - 64, 58 * (this.hp/100), 8);
            
            // Name Tag
            ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center";
            ctx.fillText(this.name, this.x, this.y - 75);

            // Shadow
            ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.ellipse(this.x, this.y + 35, 30, 12, 0, 0, Math.PI * 2); ctx.fill();
            
            let img = images[this.spriteName];
            if (img && img.complete && img.naturalWidth > 0) {
                let spriteW = img.width / 4; let spriteH = img.height / 3;
                ctx.save(); ctx.translate(this.x, this.y);
                if (!this.facingRight && this.frameY === 2) ctx.scale(-1, 1); 
                ctx.drawImage(img, this.frameX * spriteW, this.frameY * spriteH, spriteW, spriteH, -this.width / 2, -this.height / 2, this.width, this.height);
                ctx.restore();
            }
        }
    }

    // Initialize the two players far away from each other
    let p1 = new Player(4 * TILE_SIZE, 4 * TILE_SIZE, 'panda');
    let p2 = new Player((MAP_SIZE - 4) * TILE_SIZE, (MAP_SIZE - 4) * TILE_SIZE, 'fox');
    let activePlayer = p1; // Start by controlling Panda

    // --- PRO MAP GENERATOR ---
    function generateMap() {
        worldObjects = [];
        for (let r = 0; r < MAP_SIZE; r++) {
            for (let c = 0; c < MAP_SIZE; c++) {
                let x = c * TILE_SIZE; let y = r * TILE_SIZE;
                
                // Borders
                if (r === 0 || r === MAP_SIZE - 1 || c === 0 || c === MAP_SIZE - 1) { 
                    worldObjects.push({ type: 'tree', x: x, y: y, size: TILE_SIZE, isSolid: true, isHidingSpot: false });
                    continue;
                } 
                
                // Keep Spawn Zones completely clear (6x6 area for both corners)
                if ((c < 8 && r < 8) || (c > MAP_SIZE - 8 && r > MAP_SIZE - 8)) {
                    continue; 
                }

                // Generative clumps (Hide and Seek specific design)
                let rand = Math.random();
                if (rand > 0.95) {
                    worldObjects.push({ type: destructibles[Math.floor(Math.random()*destructibles.length)], x: x, y: y, size: TILE_SIZE-15, isSolid: true, isHidingSpot: false, hasMoney: true });
                } else if (rand > 0.88) {
                    worldObjects.push({ type: hidingSpots[Math.floor(Math.random()*hidingSpots.length)], x: x, y: y, size: TILE_SIZE, isSolid: false, isHidingSpot: true, hasMoney: Math.random() > 0.5 }); 
                } else if (rand > 0.82) {
                    worldObjects.push({ type: solidCover[Math.floor(Math.random()*solidCover.length)], x: x, y: y, size: TILE_SIZE, isSolid: true, isHidingSpot: false, hasMoney: false });
                }
            }
        }
    }

    // --- INPUT CONTROLS ---
    let input = { x: 0, y: 0 }; 
    const joystickZone = document.getElementById('joystick-zone'); 
    const joystickKnob = document.getElementById('joystick-knob');
    let isDragging = false, joystickCenter = { x: 0, y: 0 }, touchId = null;

    joystickZone.addEventListener('touchstart', (e) => {
        e.preventDefault(); if (isDragging) return;
        let touch = e.changedTouches[0]; touchId = touch.identifier; isDragging = true;
        let rect = joystickZone.getBoundingClientRect(); joystickCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        updateJoystick(touch.clientX, touch.clientY);
    }, {passive: false});

    window.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        for (let i = 0; i < e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === touchId) { updateJoystick(e.changedTouches[i].clientX, e.changedTouches[i].clientY); break; }
        }
    }, {passive: false});

    window.addEventListener('touchend', (e) => {
        for (let i = 0; i < e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === touchId) {
                isDragging = false; touchId = null; joystickKnob.style.transform = `translate(-50%, -50%)`; input = { x: 0, y: 0 }; break;
            }
        }
    });

    joystickZone.addEventListener('mousedown', (e) => {
        isDragging = true; let rect = joystickZone.getBoundingClientRect(); joystickCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 }; updateJoystick(e.clientX, e.clientY);
    });
    window.addEventListener('mousemove', (e) => { if (isDragging) updateJoystick(e.clientX, e.clientY); });
    window.addEventListener('mouseup', () => { isDragging = false; joystickKnob.style.transform = `translate(-50%, -50%)`; input = { x: 0, y: 0 }; });

    function updateJoystick(clientX, clientY) { 
        let dx = clientX - joystickCenter.x; let dy = clientY - joystickCenter.y; 
        let dist = Math.sqrt(dx * dx + dy * dy); let maxRad = 45; 
        if (dist > maxRad) { dx = (dx / dist) * maxRad; dy = (dy / dist) * maxRad; } 
        joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`; 
        input.x = dx / maxRad; input.y = dy / maxRad; 
    }

    function bindButton(id, callback) {
        const btn = document.getElementById(id); const handler = (e) => { e.preventDefault(); callback(); };
        btn.addEventListener('touchstart', handler, {passive: false}); btn.addEventListener('mousedown', handler);
    }

    function showAlert(text, color) {
        const alertBox = document.getElementById('alert-text');
        alertBox.innerText = text; alertBox.style.color = color; alertBox.style.opacity = 1; alertBox.style.top = "35%";
        setTimeout(() => { alertBox.style.opacity = 0; alertBox.style.top = "40%"; }, 1200);
    }

    function updateHUD() {
        document.getElementById('game-hud').innerHTML = 
            `<span style="color:#2ecc71">${p1.name} HP: ${p1.hp}</span> &nbsp;|&nbsp; <span style="color:#e67e22">${p2.name} HP: ${p2.hp}</span>`;
    }

    // Swap Control between Panda and Fox
    bindButton('btn-swap', () => {
        activePlayer.isAiming = false; 
        document.getElementById('btn-shoot').classList.remove("aiming-mode");
        input = {x:0, y:0}; joystickKnob.style.transform = `translate(-50%, -50%)`;

        if(activePlayer === p1) {
            activePlayer = p2;
            document.getElementById('btn-swap').innerText = "🦊 Playing Fox";
            document.getElementById('btn-swap').style.background = "#e67e22";
            document.getElementById('btn-swap').style.borderColor = "#d35400";
            showAlert(`${p2.name}'s Turn!`, "#e67e22");
        } else {
            activePlayer = p1;
            document.getElementById('btn-swap').innerText = "🐼 Playing Panda";
            document.getElementById('btn-swap').style.background = "#9b59b6";
            document.getElementById('btn-swap').style.borderColor = "#8e44ad";
            showAlert(`${p1.name}'s Turn!`, "#9b59b6");
        }
    });

    bindButton('btn-search', () => {
        let found = false;
        for (let obj of worldObjects) {
            let objCenterX = obj.x + obj.size/2; let objCenterY = obj.y + obj.size/2;
            let dist = Math.sqrt(Math.pow(objCenterX - activePlayer.x, 2) + Math.pow(objCenterY - activePlayer.y, 2));
            if (dist < TILE_SIZE * 1.5 && (obj.isHidingSpot || obj.hasMoney !== undefined)) {
                if (obj.hasMoney) { showAlert("💎 FOUND LOOT! 💎", "#3498db"); obj.hasMoney = false; } 
                else { showAlert("Empty...", "#e74c3c"); }
                found = true; break;
            }
        }
        if (!found) showAlert("Nothing here!", "#f39c12");
    });

    bindButton('btn-shoot', () => {
        const btn = document.getElementById('btn-shoot');
        if (!activePlayer.isAiming) {
            activePlayer.isAiming = true; btn.classList.add("aiming-mode");
        } else {
            activePlayer.isAiming = false; btn.classList.remove("aiming-mode");
            
            if (shootAudio.readyState >= 2) { let sfx = shootAudio.cloneNode(); sfx.volume = 0.6; sfx.play().catch(()=>{}); }

            let gunX = activePlayer.x + (activePlayer.facingRight ? 20 : -20); let gunY = activePlayer.y + 10;
            let hitX = gunX; let hitY = gunY; let hitObjIndex = -1; let hitOpponent = false;

            let targetPlayer = (activePlayer === p1) ? p2 : p1;

            // PRECISION RAYCASTING (Stops exactly at the object)
            for(let i=0; i<150; i++) { // 150 steps * 5px = 750px Range
                hitX += activePlayer.aimDir.x * 5; 
                hitY += activePlayer.aimDir.y * 5; 
                
                // Check Hit on Enemy Player
                if (!targetPlayer.isDead && hitX > targetPlayer.x - 20 && hitX < targetPlayer.x + 20 && hitY > targetPlayer.y - 15 && hitY < targetPlayer.y + 30) {
                    hitOpponent = true; break;
                }

                // Check Hit on World Objects
                let collided = false;
                for (let j=0; j < worldObjects.length; j++) {
                    let obj = worldObjects[j];
                    if (obj.isSolid || obj.isHidingSpot) {
                        if (hitX > obj.x && hitX < obj.x + obj.size && hitY > obj.y && hitY < obj.y + obj.size) { 
                            hitObjIndex = j; collided = true; break; 
                        }
                    }
                }
                if (collided) break; // Stop Laser exactly at the wall
            }

            camera.shakeTime = 12; camera.shakeIntensity = 25; 
            explosions.push({ x: hitX, y: hitY, radius: 10, maxRadius: 50, life: 1.0 });

            if (hitOpponent) {
                targetPlayer.hp -= 25; // Take 25 damage
                updateHUD();
                if(targetPlayer.hp <= 0) {
                    targetPlayer.isDead = true;
                    showAlert(`🏆 ${activePlayer.name} WINS! 🏆`, "#f1c40f");
                } else {
                    showAlert("🎯 DIRECT HIT! 🎯", "#e74c3c");
                }
            } else if (hitObjIndex !== -1) {
                let target = worldObjects[hitObjIndex];
                if (!solidCover.includes(target.type)) {
                    if (target.hasMoney) showAlert("💰 LOOT DESTROYED! 💰", "#2ecc71");
                    else showAlert("Boom!", "#e74c3c");
                    worldObjects.splice(hitObjIndex, 1); 
                } else {
                    showAlert("Blocked by Wall!", "#bdc3c7");
                }
            }
        }
    });

    // --- GAME START LOGIC ---
    function startGame() {
        let n1 = document.getElementById('p1-name').value.trim();
        let n2 = document.getElementById('p2-name').value.trim();
        p1.name = n1 === "" ? "Panda" : n1;
        p2.name = n2 === "" ? "Fox" : n2;
        
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('ui-layer').style.display = 'block';
        
        generateMap();
        updateHUD();
        
        // Immediately snap camera to active player on start
        camera.x = activePlayer.x - canvas.width / 2;
        camera.y = activePlayer.y - canvas.height / 2;

        requestAnimationFrame(gameLoop);
    }

    // --- RENDER LOOP (WITH FRUSTUM CULLING) ---
    function gameLoop() {
        ctx.fillStyle = '#6ab04c'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        p1.update(activePlayer === p1);
        p2.update(activePlayer === p2);

        // Smooth Camera Panning to Active Player
        let targetCamX = activePlayer.x - canvas.width / 2; let targetCamY = activePlayer.y - canvas.height / 2;
        if(camera.shakeTime > 0) { targetCamX += (Math.random() - 0.5) * camera.shakeIntensity; targetCamY += (Math.random() - 0.5) * camera.shakeIntensity; camera.shakeTime--; }
        camera.x += (targetCamX - camera.x) * 0.1; camera.y += (targetCamY - camera.y) * 0.1;

        ctx.save(); ctx.translate(-Math.floor(camera.x), -Math.floor(camera.y));

        // Viewport boundaries for Culling (MASSIVE performance boost)
        let screenLeft = camera.x - TILE_SIZE;
        let screenRight = camera.x + canvas.width + TILE_SIZE;
        let screenTop = camera.y - TILE_SIZE;
        let screenBottom = camera.y + canvas.height + TILE_SIZE*2;

        // Draw Ground Grid (Only what's on screen)
        let startCol = Math.max(0, Math.floor(camera.x / TILE_SIZE));
        let endCol = Math.min(MAP_SIZE, Math.ceil((camera.x + canvas.width) / TILE_SIZE));
        let startRow = Math.max(0, Math.floor(camera.y / TILE_SIZE));
        let endRow = Math.min(MAP_SIZE, Math.ceil((camera.y + canvas.height) / TILE_SIZE));

        for (let r = startRow; r < endRow; r++) { 
            for (let c = startCol; c < endCol; c++) { 
                if ((r+c)%2===0) { ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(c*TILE_SIZE, r*TILE_SIZE, TILE_SIZE, TILE_SIZE); } 
            } 
        }

        let renderQueue = [];
        if(!p1.isDead) renderQueue.push({ type: 'player', y: p1.y + (p1.height*0.4), obj: p1 });
        if(!p2.isDead) renderQueue.push({ type: 'player', y: p2.y + (p2.height*0.4), obj: p2 });
        
        for(let obj of worldObjects) { 
            // CULLING CHECK: Skip drawing if it's outside the camera view!
            if (obj.x > screenRight || obj.x + obj.size < screenLeft || obj.y > screenBottom || obj.y + obj.size * 2 < screenTop) continue;

            let visualY = obj.y + obj.size; 
            if(obj.type === 'stall' || obj.type === 'tree' || obj.type === 'tent') visualY = obj.y + (obj.size * 1.2); 
            renderQueue.push({ type: 'world', y: visualY, obj: obj }); 
        }
        
        renderQueue.sort((a, b) => a.y - b.y);

        for(let item of renderQueue) {
            if(item.type === 'player') item.obj.draw(ctx);
            else {
                let wObj = item.obj; 
                if(!wObj.isHidingSpot) { 
                    ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.ellipse(wObj.x + wObj.size/2, wObj.y + wObj.size - 10, wObj.size*0.4, wObj.size*0.15, 0, 0, Math.PI * 2); ctx.fill(); 
                }
                if(images[wObj.type] && images[wObj.type].complete) {
                    let drawSize = wObj.size; let drawX = wObj.x; let drawY = wObj.y;
                    if(['tree', 'stall', 'tent', 'statue'].includes(wObj.type)) { drawSize = wObj.size * 1.3; drawX = wObj.x - 10; drawY = wObj.y - 20; }
                    ctx.drawImage(images[wObj.type], drawX, drawY, drawSize, drawSize);
                }
            }
        }

        // Draw Laser perfectly snapping to target
        if (activePlayer.isAiming && !activePlayer.isDead) {
            let gunX = activePlayer.x + (activePlayer.facingRight ? 20 : -20); let gunY = activePlayer.y + 10;
            let laserX = gunX; let laserY = gunY;
            let targetPlayer = (activePlayer === p1) ? p2 : p1;

            for(let i=0; i<150; i++) { 
                laserX += activePlayer.aimDir.x * 5; laserY += activePlayer.aimDir.y * 5; 
                let hit = false;
                
                // Laser preview hits opponent
                if (!targetPlayer.isDead && laserX > targetPlayer.x-20 && laserX < targetPlayer.x+20 && laserY > targetPlayer.y-15 && laserY < targetPlayer.y+30) hit = true;
                
                // Laser preview hits wall
                for (let obj of worldObjects) { 
                    if ((obj.isSolid || obj.isHidingSpot) && laserX > obj.x && laserX < obj.x + obj.size && laserY > obj.y && laserY < obj.y + obj.size) { hit = true; break; } 
                }
                if (hit) break; // Terminate laser rendering right here!
            }
            
            // Draw sleek laser beam
            ctx.beginPath(); ctx.moveTo(gunX, gunY); ctx.lineTo(laserX, laserY); ctx.strokeStyle = "rgba(231, 76, 60, 0.5)"; ctx.lineWidth = 2; ctx.stroke(); 
            ctx.beginPath(); ctx.setLineDash([10, 10]); ctx.moveTo(gunX, gunY); ctx.lineTo(laserX, laserY); ctx.strokeStyle = "rgba(255, 0, 0, 0.9)"; ctx.lineWidth = 4; ctx.stroke(); ctx.setLineDash([]);
            ctx.beginPath(); ctx.arc(laserX, laserY, 8, 0, Math.PI * 2); ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke(); ctx.fillStyle = "rgba(231, 76, 60, 0.8)"; ctx.fill();
        }

        for (let i = explosions.length - 1; i >= 0; i--) {
            let exp = explosions[i];
            ctx.beginPath(); ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI * 2); ctx.fillStyle = `rgba(241, 196, 15, ${exp.life})`; ctx.fill();
            ctx.beginPath(); ctx.arc(exp.x, exp.y, exp.radius * 0.7, 0, Math.PI * 2); ctx.fillStyle = `rgba(231, 76, 60, ${exp.life})`; ctx.fill();
            exp.radius += 6; exp.life -= 0.1; if (exp.life <= 0) explosions.splice(i, 1);
        }

        ctx.restore(); requestAnimationFrame(gameLoop);
    }
</script>
